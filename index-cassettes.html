<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music · Cassettes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bungee&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --wood-1: #3d2a1a;
    --wood-2: #2a1d11;
    --shelf: #1a120a;
    --cream: #f4ead0;
    --tape:  #1d1a14;
    --label: #f0e4c2;
    --mono: 'Space Mono', ui-monospace, monospace;
    --display: 'Bungee', system-ui, sans-serif;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at top, rgba(255,200,120,0.06), transparent 60%),
      repeating-linear-gradient(90deg, var(--wood-1) 0px, var(--wood-1) 18px, var(--wood-2) 18px, var(--wood-2) 36px);
    color: var(--cream);
    font-family: var(--mono);
    padding: 28px 16px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }
  h1 {
    font-family: var(--display);
    font-size: clamp(28px, 5vw, 44px);
    letter-spacing: 0.04em;
    color: var(--cream);
    text-shadow: 0 2px 0 #000, 0 0 24px rgba(255,200,120,0.2);
  }
  .sub {
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(244,234,208,0.6);
  }

  #shelf {
    max-width: 900px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
  }
  @media (min-width: 720px) {
    #shelf { grid-template-columns: 1fr 1fr; gap: 22px; }
  }

  /* Cassette */
  .tape {
    position: relative;
    aspect-ratio: 16 / 10;
    background: linear-gradient(170deg, #2c2820 0%, #1a1812 100%);
    border-radius: 14px;
    border: 0;
    cursor: pointer;
    overflow: hidden;
    padding: 12px;
    box-shadow:
      0 12px 24px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 -3px 8px rgba(0,0,0,0.5);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .tape:hover {
    transform: translateY(-3px) rotate(-0.5deg);
    box-shadow:
      0 18px 32px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .tape:active { transform: translateY(1px) scale(0.985); }

  /* Screw dots in corners */
  .tape::before, .tape::after {
    content: '';
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle, #6b6155 0%, #2a241a 70%);
    box-shadow: inset 0 0 1px #000;
  }
  .tape::before { top: 6px; left: 6px; }
  .tape::after  { top: 6px; right: 6px; }

  .tape-label {
    background: var(--label);
    border-radius: 6px;
    padding: 10px 12px 8px;
    height: 100%;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    grid-template-rows: auto 1fr auto;
    grid-template-areas:
      "title title title"
      "art   spool art2"
      "meta  meta  meta";
    gap: 8px;
    color: #2a2418;
    position: relative;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), inset 0 -1px 0 rgba(0,0,0,0.1);
  }

  .tape-title {
    grid-area: title;
    font-family: var(--mono);
    font-weight: 700;
    font-size: clamp(13px, 2vw, 16px);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #2a2418;
    border-bottom: 1px dashed rgba(42,36,24,0.3);
    padding-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .tape-art {
    grid-area: art;
    border-radius: 4px;
    background-color: var(--c, #888);
    background-size: cover;
    background-position: center;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.2), inset 0 0 0 0.5px rgba(255,255,255,0.15);
  }
  .tape-art-2 {
    grid-area: art2;
    border-radius: 4px;
    background: repeating-linear-gradient(45deg, rgba(42,36,24,0.08) 0 4px, rgba(42,36,24,0.15) 4px 8px);
    box-shadow: inset 0 0 0 1px rgba(42,36,24,0.15);
  }

  .spools {
    grid-area: spool;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 0 12px;
  }
  .spool {
    width: clamp(28px, 5vw, 40px);
    aspect-ratio: 1;
    border-radius: 50%;
    background:
      radial-gradient(circle, #2a2418 0%, #2a2418 28%, #6b5e47 30%, #6b5e47 34%, #2a2418 36%, #2a2418 100%);
    position: relative;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4);
    animation: spin 8s linear infinite;
    animation-play-state: paused;
  }
  .spool::after {
    content: '';
    position: absolute;
    inset: 38%;
    border-radius: 50%;
    background: var(--label);
    box-shadow:
      0 0 0 2px var(--label),
      4px 0 0 -1px var(--label),
      -4px 0 0 -1px var(--label),
      0 4px 0 -1px var(--label),
      0 -4px 0 -1px var(--label);
  }
  .tape.playing .spool { animation-play-state: running; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tape-meta {
    grid-area: meta;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(42,36,24,0.55);
    border-top: 1px dashed rgba(42,36,24,0.3);
    padding-top: 4px;
  }
  .tape-meta .num {
    background: #2a2418;
    color: var(--label);
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 700;
  }

  /* Tape deck (player) */
  #deck {
    max-width: 900px;
    margin: 0 auto 28px;
    background:
      linear-gradient(180deg, #2a241a 0%, #1a1410 100%);
    border-radius: 18px;
    padding: 20px;
    box-shadow:
      0 8px 28px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 -2px 6px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.05);
    display: none;
  }
  #deck.active { display: block; }
  .deck-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: rgba(244,234,208,0.65);
  }
  .led {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ff5a3c;
    box-shadow: 0 0 8px #ff5a3c, 0 0 16px rgba(255,90,60,0.5);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.4; } }
  .deck-row {
    display: flex;
    gap: 14px;
    align-items: stretch;
  }
  #deck iframe {
    flex: 1;
    border: 0;
    border-radius: 12px;
    height: 152px;
    background: #1a1410;
    min-width: 0;
  }
  #eject {
    border: 0;
    border-radius: 12px;
    background: linear-gradient(180deg, #f4ead0, #d4c89a);
    color: #2a1d11;
    font-family: var(--display);
    font-size: 18px;
    letter-spacing: 0.04em;
    padding: 0 18px;
    cursor: pointer;
    box-shadow: 0 4px 0 #6b5e47, inset 0 1px 0 rgba(255,255,255,0.8);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    flex-shrink: 0;
    min-width: 96px;
  }
  #eject:active { transform: translateY(3px); box-shadow: 0 1px 0 #6b5e47, inset 0 1px 0 rgba(255,255,255,0.8); }
  @media (max-width: 600px) {
    .deck-row { flex-wrap: wrap; }
    #eject { width: 100%; padding: 14px; min-height: 56px; }
  }
</style>
</head>
<body>
<header>
  <h1>Tape Deck</h1>
  <div class="sub">Pick a cassette · 8 tapes</div>
</header>

<div id="deck">
  <div class="deck-head"><span class="led"></span> Now Playing · Side A</div>
  <div class="deck-row">
    <iframe id="deck-iframe" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="eager"></iframe>
    <button id="eject" aria-label="Eject and stop">Eject</button>
  </div>
</div>

<div id="shelf"></div>

<script>
(function(){
  const CARDS = [
    { url: 'https://open.spotify.com/playlist/2H5WIi9pNC5aM8fP9XWBxf', accent: '#E27D60' },
    { url: 'https://open.spotify.com/album/7yPJu92ht3NA8pKKI6D8TE',    accent: '#6B9080' },
    { url: 'https://open.spotify.com/album/2CNEkSE8TADXRT2AzcEt1b',    accent: '#E8B647' },
    { url: 'https://open.spotify.com/album/3usnShwygMXVZB4IV5dwnU',    accent: '#9C6FE4' },
    { url: 'https://open.spotify.com/album/2fxQs4i9HfyRME7zjp0ZnB',    accent: '#4FB3AB' },
    { url: 'https://open.spotify.com/album/1mcbcxox0vOHK5bjCaa9xp',    accent: '#E76F8E' },
    { url: 'https://open.spotify.com/playlist/14C5iEKg3K4Dj6AFkB5sJ9', accent: '#5DA9E9' },
    { url: 'https://open.spotify.com/playlist/637DehzVYKHDDz3AEh6iwa', accent: '#D58A5E' },
  ];

  function parse(url) {
    const m = url.match(/open\.spotify\.com\/(?:intl-\w+\/)?(track|album|playlist|artist|episode)\/([a-zA-Z0-9]+)/);
    return m ? { type: m[1], id: m[2] } : null;
  }
  const embed = (t, id) => 'https://open.spotify.com/embed/' + t + '/' + id + '?utm_source=jukebox-cassettes';

  const shelf = document.getElementById('shelf');
  const deck = document.getElementById('deck');
  const deckIframe = document.getElementById('deck-iframe');

  CARDS.forEach((card, i) => {
    const p = parse(card.url);
    if (!p) return;
    card.type = p.type; card.id = p.id; card.index = i;

    const fallback = card.type === 'playlist' ? 'Mix Tape' : 'Album';
    const tape = document.createElement('button');
    tape.className = 'tape';
    tape.style.setProperty('--c', card.accent);
    tape.innerHTML =
      '<div class="tape-label">' +
        '<div class="tape-title" data-title="' + i + '">' + fallback + ' ' + String(i + 1).padStart(2, '0') + '</div>' +
        '<div class="tape-art" data-art="' + i + '"></div>' +
        '<div class="spools"><div class="spool"></div><div class="spool"></div></div>' +
        '<div class="tape-art-2"></div>' +
        '<div class="tape-meta">' +
          '<span>Side A · ' + card.type.toUpperCase() + '</span>' +
          '<span class="num">No. ' + String(i + 1).padStart(2, '0') + '</span>' +
        '</div>' +
      '</div>';

    tape.addEventListener('click', () => play(card, tape));
    card.element = tape;
    shelf.appendChild(tape);
  });

  function play(card, tape) {
    document.querySelectorAll('.tape.playing').forEach(el => el.classList.remove('playing'));
    tape.classList.add('playing');
    deckIframe.src = embed(card.type, card.id);
    deck.classList.add('active');
    deck.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  document.getElementById('eject').addEventListener('click', () => {
    deckIframe.src = 'about:blank';
    deck.classList.remove('active');
    document.querySelectorAll('.tape.playing').forEach(el => el.classList.remove('playing'));
  });

  async function loadMeta() {
    for (const card of CARDS) {
      try {
        const r = await fetch('https://open.spotify.com/oembed?url=' + encodeURIComponent(card.url));
        if (!r.ok) continue;
        const d = await r.json();
        const artEl = document.querySelector('[data-art="' + card.index + '"]');
        const titleEl = document.querySelector('[data-title="' + card.index + '"]');
        if (d.thumbnail_url && artEl) {
          const img = new Image();
          img.onload = () => { artEl.style.backgroundImage = 'url(' + d.thumbnail_url + ')'; };
          img.src = d.thumbnail_url;
        }
        if (d.title && titleEl) titleEl.textContent = d.title;
      } catch (e) {}
    }
  }
  loadMeta();
})();
</script>
</body>
</html>
