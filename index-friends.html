<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music · Friends</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg-1: #FFF4E0;
    --bg-2: #FFE6C7;
    --ink:  #2A2418;
    --font: 'Fredoka', system-ui, -apple-system, sans-serif;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, var(--bg-2), transparent),
      var(--bg-1);
    color: var(--ink);
    font-family: var(--font);
    font-weight: 600;
    padding: 24px 16px 80px;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
  }
  h1 {
    font-family: var(--font);
    font-weight: 700;
    font-size: clamp(32px, 6vw, 52px);
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  h1 .wave { display: inline-block; animation: wave 2s ease-in-out infinite; transform-origin: 70% 70%; }
  @keyframes wave { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(15deg); } 75% { transform: rotate(-10deg); } }

  .sub {
    margin-top: 6px;
    color: rgba(42,36,24,0.55);
    font-weight: 500;
    font-size: 16px;
  }

  #grid {
    max-width: 980px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }
  @media (min-width: 640px) {
    #grid { grid-template-columns: repeat(3, 1fr); gap: 24px; }
  }
  @media (min-width: 960px) {
    #grid { grid-template-columns: repeat(4, 1fr); }
  }

  .friend {
    border: 0;
    background: transparent;
    cursor: pointer;
    padding: 8px;
    font-family: inherit;
    color: inherit;
    position: relative;
    transition: transform 0.2s ease;
  }
  .friend:hover { transform: translateY(-4px) rotate(var(--tilt, -1deg)); }
  .friend:active { transform: scale(0.95); }
  .friend:nth-child(odd)  { --tilt: -1.5deg; }
  .friend:nth-child(even) { --tilt:  1.5deg; }

  .blob-wrap {
    position: relative;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 8px 0 rgba(42,36,24,0.12)) drop-shadow(0 14px 16px rgba(42,36,24,0.18));
  }
  .blob {
    width: 100%;
    height: 100%;
    background-color: var(--c, #E27D60);
    border-radius: var(--shape, 50% 48% 52% 50% / 48% 52% 48% 52%);
    animation: jiggle var(--dur, 6s) ease-in-out infinite;
    transform-origin: center bottom;
    position: relative;
    overflow: hidden;
  }
  @keyframes jiggle {
    0%, 100% { transform: scale(1, 1) rotate(0); }
    25%      { transform: scale(1.02, 0.98) rotate(-0.5deg); }
    50%      { transform: scale(0.99, 1.01); }
    75%      { transform: scale(1.01, 0.99) rotate(0.5deg); }
  }
  .friend.playing .blob { animation: bop 0.6s ease-in-out infinite; }
  @keyframes bop {
    0%, 100% { transform: translateY(0) scale(1, 1); }
    50%      { transform: translateY(-6px) scale(1.04, 0.96); }
  }

  /* Belly = cover art */
  .belly {
    position: absolute;
    width: 58%;
    aspect-ratio: 1;
    border-radius: 50%;
    top: 48%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: rgba(255,255,255,0.25);
    background-size: cover;
    background-position: center;
    box-shadow: inset 0 0 0 4px rgba(255,255,255,0.4), inset 0 4px 12px rgba(0,0,0,0.15);
    z-index: 1;
  }

  /* Face */
  .face {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }
  .eye {
    position: absolute;
    width: 14%;
    aspect-ratio: 1;
    background: #2A2418;
    border-radius: 50%;
    top: 18%;
  }
  .eye::after {
    content: '';
    position: absolute;
    width: 35%;
    aspect-ratio: 1;
    background: white;
    border-radius: 50%;
    top: 18%;
    left: 18%;
  }
  .eye.l { left: 24%; }
  .eye.r { right: 24%; }
  .blush {
    position: absolute;
    width: 12%;
    aspect-ratio: 1;
    background: rgba(255, 90, 100, 0.45);
    border-radius: 50%;
    top: 38%;
    filter: blur(1px);
  }
  .blush.l { left: 16%; }
  .blush.r { right: 16%; }
  .mouth {
    position: absolute;
    width: 22%;
    height: 11%;
    border-bottom: 4px solid #2A2418;
    border-radius: 0 0 50% 50%;
    left: 50%;
    top: 38%;
    transform: translateX(-50%);
  }

  .name {
    margin-top: 12px;
    text-align: center;
    font-family: var(--font);
    font-weight: 600;
    font-size: clamp(15px, 2vw, 18px);
    color: var(--ink);
    line-height: 1.2;
  }

  /* Player overlay */
  #player {
    position: fixed;
    inset: 0;
    background: rgba(42, 36, 24, 0.55);
    backdrop-filter: blur(12px);
    z-index: 10;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #player.active { display: flex; animation: fadein 0.25s ease; }
  @keyframes fadein { from { opacity: 0; } }
  .modal {
    background: var(--bg-1);
    border-radius: 32px;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .modal-friend {
    aspect-ratio: 1;
    max-height: 200px;
    margin: 0 auto;
    position: relative;
  }
  #player iframe {
    width: 100%;
    height: 152px;
    border: 0;
    border-radius: 20px;
    background: var(--bg-2);
  }
  #close-btn {
    border: 0;
    background: var(--ink);
    color: var(--bg-1);
    font-family: var(--font);
    font-weight: 700;
    font-size: 22px;
    padding: 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: transform 0.08s ease;
  }
  #close-btn:active { transform: scale(0.96); }
</style>
</head>
<body>
<header>
  <h1>Hi <span class="wave">👋</span></h1>
  <div class="sub">pick a friend to sing for you</div>
</header>

<div id="grid"></div>

<div id="player" role="dialog" aria-label="Now playing">
  <div class="modal">
    <div id="modal-friend" class="modal-friend"></div>
    <iframe id="player-iframe" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="eager"></iframe>
    <button id="close-btn">Bye bye!</button>
  </div>
</div>

<script>
(function(){
  // 8 distinct blob shapes (organic, asymmetric border-radius) + animation timing.
  const SHAPES = [
    '64% 36% 58% 42% / 52% 48% 52% 48%',
    '48% 52% 38% 62% / 60% 40% 60% 40%',
    '58% 42% 62% 38% / 38% 62% 38% 62%',
    '42% 58% 48% 52% / 56% 44% 56% 44%',
    '52% 48% 64% 36% / 48% 52% 48% 52%',
    '38% 62% 52% 48% / 62% 38% 62% 38%',
    '56% 44% 42% 58% / 44% 56% 44% 56%',
    '60% 40% 50% 50% / 50% 50% 50% 50%',
  ];
  const NAMES = ['Tangerine', 'Mossy', 'Sunny', 'Plum', 'Mint', 'Rosie', 'Sky', 'Honey'];

  const CARDS = [
    { url: 'https://open.spotify.com/playlist/2H5WIi9pNC5aM8fP9XWBxf', accent: '#E27D60' },
    { url: 'https://open.spotify.com/album/7yPJu92ht3NA8pKKI6D8TE',    accent: '#6B9080' },
    { url: 'https://open.spotify.com/album/2CNEkSE8TADXRT2AzcEt1b',    accent: '#E8B647' },
    { url: 'https://open.spotify.com/album/3usnShwygMXVZB4IV5dwnU',    accent: '#9C6FE4' },
    { url: 'https://open.spotify.com/album/2fxQs4i9HfyRME7zjp0ZnB',    accent: '#4FB3AB' },
    { url: 'https://open.spotify.com/album/1mcbcxox0vOHK5bjCaa9xp',    accent: '#E76F8E' },
    { url: 'https://open.spotify.com/playlist/14C5iEKg3K4Dj6AFkB5sJ9', accent: '#5DA9E9' },
    { url: 'https://open.spotify.com/playlist/637DehzVYKHDDz3AEh6iwa', accent: '#D58A5E' },
  ];

  function parse(url) {
    const m = url.match(/open\.spotify\.com\/(?:intl-\w+\/)?(track|album|playlist|artist|episode)\/([a-zA-Z0-9]+)/);
    return m ? { type: m[1], id: m[2] } : null;
  }
  const embed = (t, id) => 'https://open.spotify.com/embed/' + t + '/' + id + '?utm_source=jukebox-friends';

  function friendMarkup() {
    return '<div class="blob-wrap">' +
             '<div class="blob"><div class="belly"></div></div>' +
             '<div class="face">' +
               '<div class="eye l"></div>' +
               '<div class="eye r"></div>' +
               '<div class="blush l"></div>' +
               '<div class="blush r"></div>' +
               '<div class="mouth"></div>' +
             '</div>' +
           '</div>';
  }

  const grid = document.getElementById('grid');
  const player = document.getElementById('player');
  const iframe = document.getElementById('player-iframe');
  const modalFriend = document.getElementById('modal-friend');

  CARDS.forEach((card, i) => {
    const p = parse(card.url);
    if (!p) return;
    card.type = p.type; card.id = p.id; card.index = i;
    card.shape = SHAPES[i % SHAPES.length];
    card.name = NAMES[i % NAMES.length];

    const btn = document.createElement('button');
    btn.className = 'friend';
    btn.style.setProperty('--c', card.accent);
    btn.style.setProperty('--shape', card.shape);
    btn.style.setProperty('--dur', (5 + (i % 4)) + 's');
    btn.innerHTML = friendMarkup() + '<div class="name">' + card.name + '</div>';
    btn.setAttribute('aria-label', card.name);

    const belly = btn.querySelector('.belly');
    card.belly = belly;

    btn.addEventListener('click', () => play(card, btn));
    card.element = btn;
    grid.appendChild(btn);
  });

  function play(card, btn) {
    document.querySelectorAll('.friend.playing').forEach(el => el.classList.remove('playing'));
    btn.classList.add('playing');

    // Clone friend into modal
    modalFriend.innerHTML = friendMarkup();
    const wrap = modalFriend.querySelector('.blob-wrap');
    wrap.style.height = '100%';
    const blob = wrap.querySelector('.blob');
    blob.style.background = card.accent;
    blob.style.borderRadius = card.shape;
    if (card.thumb) {
      wrap.querySelector('.belly').style.backgroundImage = 'url(' + card.thumb + ')';
    }
    modalFriend.querySelector('.blob').classList.add('bop-on'); // visual cue handled via class .playing below
    modalFriend.parentElement.classList.add('playing-modal'); // not required, friends bops in grid

    iframe.src = embed(card.type, card.id);
    player.classList.add('active');
  }

  function close() {
    iframe.src = 'about:blank';
    player.classList.remove('active');
    document.querySelectorAll('.friend.playing').forEach(el => el.classList.remove('playing'));
  }
  document.getElementById('close-btn').addEventListener('click', close);
  player.addEventListener('click', (e) => { if (e.target === player) close(); });

  async function loadMeta() {
    for (const card of CARDS) {
      try {
        const r = await fetch('https://open.spotify.com/oembed?url=' + encodeURIComponent(card.url));
        if (!r.ok) continue;
        const d = await r.json();
        if (d.thumbnail_url && card.belly) {
          card.thumb = d.thumbnail_url;
          const img = new Image();
          img.onload = () => { card.belly.style.backgroundImage = 'url(' + d.thumbnail_url + ')'; };
          img.src = d.thumbnail_url;
        }
      } catch (e) {}
    }
  }
  loadMeta();
})();
</script>
</body>
</html>
