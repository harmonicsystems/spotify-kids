<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music · Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg:   #0c0a08;
    --bg-2: #14110d;
    --ink:  #f0eadd;
    --ink-2:#b8ad96;
    --ink-3:#6f6552;
    --rule: #2a2418;
    --serif: 'Instrument Serif', Georgia, serif;
    --mono:  'JetBrains Mono', ui-monospace, monospace;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 60% 50% at 50% 40%, rgba(255, 220, 180, 0.06), transparent 70%),
      var(--bg);
    color: var(--ink);
    font-family: var(--serif);
    overflow-x: hidden;
    user-select: none;
  }

  /* Spotlight glow that takes the current accent */
  body::before {
    content: '';
    position: fixed;
    top: 20%;
    left: 50%;
    width: 80vw;
    max-width: 800px;
    aspect-ratio: 1;
    background: radial-gradient(circle, var(--glow, transparent) 0%, transparent 65%);
    transform: translate(-50%, -50%);
    filter: blur(80px);
    opacity: 0.45;
    pointer-events: none;
    transition: background 0.6s ease;
    z-index: 0;
  }

  main {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 24px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-3);
  }

  /* Stage */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 20px;
  }
  .cover {
    width: min(70vw, 60vh, 520px);
    aspect-ratio: 1;
    border-radius: 8px;
    background-color: var(--c, #2a241a);
    background-size: cover;
    background-position: center;
    box-shadow:
      0 30px 60px rgba(0,0,0,0.6),
      0 60px 120px rgba(0,0,0,0.35),
      inset 0 0 0 0.5px rgba(255,255,255,0.08);
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(.2,.8,.2,1), box-shadow 0.4s ease;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.9);
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(64px, 12vw, 140px);
    text-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .cover.has-art { color: transparent; text-shadow: none; }
  .cover:hover { transform: translateY(-6px); }
  .cover:active { transform: scale(0.985); }

  /* Title plate */
  .plate {
    text-align: center;
    margin-top: 28px;
    max-width: 600px;
    padding: 0 20px;
  }
  .plate-num {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 10px;
  }
  .plate-title {
    font-family: var(--serif);
    font-size: clamp(22px, 3.4vw, 32px);
    font-weight: 400;
    line-height: 1.2;
    color: var(--ink);
    font-style: italic;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* Navigation arrows */
  .nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 0;
    background: rgba(240, 234, 221, 0.08);
    color: var(--ink);
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background 0.15s ease, transform 0.1s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }
  .nav:hover { background: rgba(240, 234, 221, 0.18); }
  .nav:active { transform: translateY(-50%) scale(0.92); }
  .nav.prev { left: 20px; }
  .nav.next { right: 20px; }
  .nav svg { width: 28px; height: 28px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  /* Filmstrip */
  .strip {
    display: flex;
    gap: 10px;
    padding: 28px 24px 36px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    justify-content: flex-start;
  }
  .strip::-webkit-scrollbar { display: none; }
  .thumb {
    flex: 0 0 auto;
    width: 64px;
    height: 64px;
    border-radius: 6px;
    background-color: var(--c, #2a241a);
    background-size: cover;
    background-position: center;
    border: 0;
    cursor: pointer;
    scroll-snap-align: center;
    transition: transform 0.2s ease, outline-color 0.2s ease;
    outline: 2px solid transparent;
    outline-offset: 3px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    color: rgba(255,255,255,0.95);
    font-family: var(--serif);
    font-style: italic;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .thumb.has-art { color: transparent; }
  .thumb.active {
    outline-color: var(--ink);
    transform: scale(1.1);
  }
  .thumb:hover:not(.active) { transform: translateY(-2px); }

  /* Bottom bar with play / stop */
  .bar {
    position: relative;
    padding: 0 24px 28px;
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: center;
  }
  .play-btn, .stop-btn {
    border: 0;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    padding: 16px 28px;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .play-btn {
    background: var(--ink);
    color: var(--bg);
  }
  .play-btn:hover { background: #fff; }
  .play-btn:active { transform: scale(0.97); }
  .stop-btn {
    background: transparent;
    color: var(--ink-2);
    border: 1px solid var(--rule);
    display: none;
  }
  .stop-btn.show { display: inline-flex; }
  .stop-btn:hover { color: var(--ink); border-color: var(--ink-2); }
  .play-btn svg, .stop-btn svg { width: 14px; height: 14px; }

  /* Player drawer */
  #drawer {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--bg-2);
    border-top: 1px solid var(--rule);
    padding: 12px;
    transform: translateY(120%);
    transition: transform 0.35s cubic-bezier(.2,.8,.2,1);
    z-index: 20;
  }
  #drawer.open { transform: translateY(0); }
  #drawer iframe {
    width: 100%;
    height: 152px;
    border: 0;
    border-radius: 12px;
    background: var(--bg);
    display: block;
  }
</style>
</head>
<body>
<main>
  <header>
    <span>Today's Selection</span>
    <span id="position">01 / 08</span>
  </header>

  <div class="stage">
    <button class="nav prev" id="prev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>
    </button>
    <div style="display: flex; flex-direction: column; align-items: center;">
      <div class="cover" id="cover" role="button" aria-label="Play this album"></div>
      <div class="plate">
        <div class="plate-num" id="plate-num">No. 01</div>
        <div class="plate-title" id="plate-title">—</div>
      </div>
    </div>
    <button class="nav next" id="next" aria-label="Next">
      <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
    </button>
  </div>

  <div class="bar">
    <button class="play-btn" id="play-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      Play
    </button>
    <button class="stop-btn" id="stop-btn">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
      Stop
    </button>
  </div>

  <div class="strip" id="strip"></div>
</main>

<div id="drawer">
  <iframe id="player-iframe" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="eager"></iframe>
</div>

<script>
(function(){
  const CARDS = [
    { url: 'https://open.spotify.com/playlist/2H5WIi9pNC5aM8fP9XWBxf', accent: '#E27D60' },
    { url: 'https://open.spotify.com/album/7yPJu92ht3NA8pKKI6D8TE',    accent: '#6B9080' },
    { url: 'https://open.spotify.com/album/2CNEkSE8TADXRT2AzcEt1b',    accent: '#E8B647' },
    { url: 'https://open.spotify.com/album/3usnShwygMXVZB4IV5dwnU',    accent: '#9C6FE4' },
    { url: 'https://open.spotify.com/album/2fxQs4i9HfyRME7zjp0ZnB',    accent: '#4FB3AB' },
    { url: 'https://open.spotify.com/album/1mcbcxox0vOHK5bjCaa9xp',    accent: '#E76F8E' },
    { url: 'https://open.spotify.com/playlist/14C5iEKg3K4Dj6AFkB5sJ9', accent: '#5DA9E9' },
    { url: 'https://open.spotify.com/playlist/637DehzVYKHDDz3AEh6iwa', accent: '#D58A5E' },
  ];

  function parse(url) {
    const m = url.match(/open\.spotify\.com\/(?:intl-\w+\/)?(track|album|playlist|artist|episode)\/([a-zA-Z0-9]+)/);
    return m ? { type: m[1], id: m[2] } : null;
  }
  const embed = (t, id) => 'https://open.spotify.com/embed/' + t + '/' + id + '?utm_source=jukebox-gallery';

  const cover = document.getElementById('cover');
  const plateNum = document.getElementById('plate-num');
  const plateTitle = document.getElementById('plate-title');
  const position = document.getElementById('position');
  const strip = document.getElementById('strip');
  const drawer = document.getElementById('drawer');
  const iframe = document.getElementById('player-iframe');
  const stopBtn = document.getElementById('stop-btn');

  CARDS.forEach((card, i) => {
    const p = parse(card.url);
    if (!p) return;
    card.type = p.type; card.id = p.id; card.index = i;

    const fallback = card.type === 'playlist' ? 'Mix' : 'Album';
    card.title = fallback + ' ' + String(i + 1).padStart(2, '0');

    const t = document.createElement('button');
    t.className = 'thumb';
    t.style.setProperty('--c', card.accent);
    t.dataset.idx = i;
    t.textContent = (i + 1);
    t.setAttribute('aria-label', 'Select card ' + (i + 1));
    t.addEventListener('click', () => select(i));
    card.thumbEl = t;
    strip.appendChild(t);
  });

  let current = 0;

  function select(i) {
    current = (i + CARDS.length) % CARDS.length;
    const card = CARDS[current];

    document.body.style.setProperty('--glow', card.accent);
    cover.style.setProperty('--c', card.accent);
    if (card.thumb) {
      cover.style.backgroundImage = 'url(' + card.thumb + ')';
      cover.classList.add('has-art');
      cover.textContent = '';
    } else {
      cover.style.backgroundImage = '';
      cover.classList.remove('has-art');
      cover.textContent = (current + 1);
    }
    plateNum.textContent = 'No. ' + String(current + 1).padStart(2, '0') + ' · ' + card.type;
    plateTitle.textContent = card.title;
    position.textContent = String(current + 1).padStart(2, '0') + ' / ' + String(CARDS.length).padStart(2, '0');

    document.querySelectorAll('.thumb.active').forEach(el => el.classList.remove('active'));
    if (card.thumbEl) {
      card.thumbEl.classList.add('active');
      card.thumbEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
  }

  function play() {
    const card = CARDS[current];
    iframe.src = embed(card.type, card.id);
    drawer.classList.add('open');
    stopBtn.classList.add('show');
  }

  function stop() {
    iframe.src = 'about:blank';
    drawer.classList.remove('open');
    stopBtn.classList.remove('show');
  }

  document.getElementById('prev').addEventListener('click', () => select(current - 1));
  document.getElementById('next').addEventListener('click', () => select(current + 1));
  document.getElementById('play-btn').addEventListener('click', play);
  cover.addEventListener('click', play);
  stopBtn.addEventListener('click', stop);

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  select(current - 1);
    if (e.key === 'ArrowRight') select(current + 1);
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); play(); }
    if (e.key === 'Escape') stop();
  });

  // Swipe on cover
  let touchX = null;
  cover.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX; }, { passive: true });
  cover.addEventListener('touchend', (e) => {
    if (touchX == null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) { dx < 0 ? select(current + 1) : select(current - 1); }
    touchX = null;
  });

  async function loadMeta() {
    for (const card of CARDS) {
      try {
        const r = await fetch('https://open.spotify.com/oembed?url=' + encodeURIComponent(card.url));
        if (!r.ok) continue;
        const d = await r.json();
        if (d.thumbnail_url) {
          card.thumb = d.thumbnail_url;
          const img = new Image();
          img.onload = () => {
            if (card.thumbEl) {
              card.thumbEl.style.backgroundImage = 'url(' + d.thumbnail_url + ')';
              card.thumbEl.classList.add('has-art');
              card.thumbEl.textContent = '';
            }
            if (card.index === current) select(current);
          };
          img.src = d.thumbnail_url;
        }
        if (d.title) {
          card.title = d.title;
          if (card.index === current) plateTitle.textContent = d.title;
        }
      } catch (e) {}
    }
  }

  select(0);
  loadMeta();
})();
</script>
</body>
</html>
